name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Install DevKit Pro
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential devkitpro-pkgconfig-base libdevkit-ppc libogc
    
    - name: Build
      run: make
    
    - name: Clean
      run: make clean
